<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدودنا</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #1a0f08;
    min-height: 100vh;
    color: #ffffff;
    overflow-x: hidden;
    direction: rtl;
  }

  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(245, 237, 227, 0.4);
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; }
    to { opacity: 0.7; }
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  .hero {
    text-align: center;
    padding: 50px 20px 30px;
    animation: heroIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes heroIn {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-ring {
    width: 200px;
    height: 200px;
    margin: 0 auto 20px;
    position: relative;
  }

  .ring-svg {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    animation: spin 18s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .logo-img-wrap {
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #c89060;
    background: linear-gradient(135deg, #6b4226, #a0522d);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
  }

  .logo-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    padding: 6px;
  }

  h1.brand {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #e8c89a;
    margin-bottom: 6px;
    line-height: 1;
  }

  .gold-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c89060, transparent);
    margin: 16px auto;
  }

  .tagline {
    font-size: 13px;
    letter-spacing: 4px;
    color: #c8a97a;
    font-weight: 400;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 0 0 28px;
    animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .filter-btn {
    padding: 10px 20px;
    border-radius: 100px;
    border: 2px solid #8b5e3c;
    background: #3d1f0d;
    color: #f0d0a0;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .filter-btn:hover {
    border-color: #e8c89a;
    background: #5a2e10;
    color: #ffffff;
    transform: translateY(-2px);
  }

  .filter-btn.active {
    background: #c89060;
    border-color: #e8c89a;
    color: #1a0f08;
    font-weight: 900;
    box-shadow: 0 4px 18px rgba(200, 144, 96, 0.5);
    transform: translateY(-2px);
  }

  .count-badge {
    font-size: 11px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 100px;
    padding: 1px 7px;
    margin-right: 4px;
    font-weight: 600;
  }

  .category-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .category-header h2 {
    font-size: 24px;
    font-weight: 700;
    color: #e8c89a;
    letter-spacing: 2px;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }

  .menu-card {
    background: #2a1208;
    border: 1.5px solid #5a3018;
    border-radius: 13px;
    padding: 15px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0;
    transform: translateY(12px);
  }

  .menu-card:hover {
    border-color: #c89060;
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(107, 66, 38, 0.4);
    background: #331508;
  }

  .menu-card.visible {
    animation: cardIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dot-accent {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c89060;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(200, 144, 96, 0.6);
  }

  .card-info { flex: 1; }

  .card-info h3 {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
  }

  .card-info .cat-tag {
    font-size: 12px;
    color: #c8a070;
    font-weight: 400;
    display: block;
    margin-top: 2px;
  }

  .divider {
    width: 1px;
    height: 30px;
    background: #5a3018;
    flex-shrink: 0;
  }

  .card-price {
    font-size: 14px;
    font-weight: 700;
    color: #e8c89a;
    white-space: nowrap;
    direction: ltr;
    text-align: left;
  }

  footer {
    margin-top: 40px;
    text-align: center;
    padding: 24px 20px 0;
    border-top: 1px solid #3a1a08;
  }

  footer p {
    font-size: 12px;
    color: #c8a070;
    letter-spacing: 4px;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .social-links {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .social-link {
    padding: 8px 22px;
    border-radius: 100px;
    border: 2px solid #6b4226;
    color: #e8c89a;
    background: #2a1208;
    text-decoration: none;
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 600;
    transition: all 0.3s;
  }

  .social-link:hover {
    background: #5a2e10;
    border-color: #c89060;
    color: #ffffff;
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="content">
  <div class="hero">
    <div class="logo-ring">
      <svg class="ring-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="96" stroke="url(#goldRing)" stroke-width="1.5" stroke-dasharray="9 5"/>
        <circle cx="100" cy="4" r="3" fill="#c89060"/>
        <circle cx="100" cy="196" r="3" fill="#c89060"/>
        <circle cx="4" cy="100" r="3" fill="#c89060"/>
        <circle cx="196" cy="100" r="3" fill="#c89060"/>
        <defs>
          <linearGradient id="goldRing" x1="0" y1="0" x2="200" y2="200">
            <stop offset="0%" stop-color="#e8c89a"/>
            <stop offset="40%" stop-color="#6b4226"/>
            <stop offset="100%" stop-color="#e8c89a"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-img-wrap" id="logoWrap">
        <img src="jdoudna-removebg-preview.png" alt="جدودنا" id="logoImg">
      </div>
    </div>
    <h1 class="brand">جدودنا</h1>
    <div class="gold-line"></div>
    <p class="tagline">قائمة الطعام والمشروبات</p>
  </div>

  <div class="filters" id="filters"></div>

  <div class="category-header" id="catHeader" style="display:none">
    <h2 id="catTitle"></h2>
    <div class="gold-line" style="margin-top:10px"></div>
  </div>

  <div class="menu-grid" id="menuGrid"></div>

  <footer>
    <p>تابعونا على</p>
    <div class="social-links">
      <a class="social-link" href="https://www.instagram.com/Jdoudna__" target="_blank">Instagram</a>
      <a class="social-link" href="https://www.tiktok.com/@jdoudna.restaurant" target="_blank">TikTok</a>
      <a class="social-link" href="https://www.facebook.com/jdoudnarestaurant" target="_blank">Facebook</a>
    </div>
  </footer>
</div>

<script>
  const menuData = [
    { name: 'ركوة قهوة', price: 'ل.ل 450,000', cat: 'مشروبات ساخنة' },
    { name: 'نسكافيه', price: 'ل.ل 200,000', cat: 'مشروبات ساخنة' },
    { name: 'كابوتشينو', price: 'ل.ل 200,000', cat: 'مشروبات ساخنة' },
    { name: 'ابريق شاي', price: 'ل.ل 550,000', cat: 'مشروبات ساخنة' },
    { name: 'شاي', price: 'ل.ل 150,000', cat: 'مشروبات ساخنة' },
    { name: 'هوت تشوكوليت', price: 'ل.ل 300,000', cat: 'مشروبات ساخنة' },
    { name: 'شاي أخضر', price: 'ل.ل 200,000', cat: 'مشروبات ساخنة' },
    { name: 'مشروبات غازية', price: 'ل.ل 100,000', cat: 'مشروبات باردة' },
    { name: 'مياه غازية', price: 'ل.ل 200,000', cat: 'مشروبات باردة' },
    { name: 'مياه معدنية', price: 'ل.ل 150,000', cat: 'مشروبات باردة' },
    { name: 'مياه معدنية صغير', price: 'ل.ل 50,000', cat: 'مشروبات باردة' },
    { name: 'مشروب طاقة', price: 'ل.ل 150,000', cat: 'مشروبات باردة' },
    { name: 'عصير معلب', price: 'ل.ل 100,000', cat: 'مشروبات باردة' },
    { name: 'بيرة بدون كحول', price: 'ل.ل 200,000', cat: 'مشروبات باردة' },
    { name: 'فرييز', price: 'ل.ل 200,000', cat: 'مشروبات باردة' },
    { name: 'تفاحتين', price: 'ل.ل 500,000', cat: 'أركيلة' },
    { name: 'حامض و نعنع', price: 'ل.ل 500,000', cat: 'أركيلة' },
    { name: 'عنب و نعنع', price: 'ل.ل 500,000', cat: 'أركيلة' },
    { name: 'منقل فحم للشوي', price: 'ل.ل 600,000', cat: 'خدمات' },
    { name: 'منقل فحم للأركيلة', price: 'ل.ل 200,000', cat: 'خدمات' },
    { name: 'خدمة غاز', price: 'ل.ل 150,000', cat: 'خدمات' },
    { name: 'خدمة قلي', price: 'ل.ل 300,000', cat: 'خدمات' },
    { name: 'خدمة شوي', price: 'ل.ل 300,000/كجم', cat: 'خدمات' },
    { name: 'تبولة', price: 'ل.ل 500,000', cat: 'مأكولات' },
    { name: 'فتوش', price: 'ل.ل 500,000', cat: 'مأكولات' },
    { name: 'سلطة موسمية', price: 'ل.ل 500,000', cat: 'مأكولات' },
    { name: 'حمص بالطحينة', price: 'ل.ل 400,000', cat: 'مأكولات' },
    { name: 'متبل باذنجان', price: 'ل.ل 400,000', cat: 'مأكولات' },
    { name: 'كبة مقلية', price: 'ل.ل 500,000', cat: 'مأكولات' },
    { name: 'رقائق جبنة', price: 'ل.ل 500,000', cat: 'مأكولات' },
    { name: 'ورق عنب', price: 'ل.ل 500,000', cat: 'مأكولات' },
    { name: 'بطاطا مقلية صغير', price: 'ل.ل 400,000', cat: 'مأكولات' },
    { name: 'بطاطا مقلية كبير', price: 'ل.ل 500,000', cat: 'مأكولات' },
    { name: 'مشاوي مشكل (كيلو)', price: 'ل.ل 2,800,000', cat: 'مأكولات' },
    { name: 'مشاوي مشكل غنم (كيلو)', price: 'ل.ل 3,500,000', cat: 'مأكولات' },
    { name: 'وجبة مشاوي', price: 'ل.ل 1,100,000', cat: 'مأكولات' },
    { name: 'ساندويش طاووق', price: 'ل.ل 500,000', cat: 'ساندويشات' },
    { name: 'ساندويش لحمة', price: 'ل.ل 500,000', cat: 'ساندويشات' },
    { name: 'ساندويش كفتة', price: 'ل.ل 500,000', cat: 'ساندويشات' },
    { name: 'ساندويش بطاطا مقلية', price: 'ل.ل 250,000', cat: 'ساندويشات' },
  ];

  const categories = ['الكل', 'مشروبات ساخنة', 'مشروبات باردة', 'أركيلة', 'مأكولات', 'ساندويشات', 'خدمات'];
  let active = 'الكل';

  // Logo fallback
  const logoImg = document.getElementById('logoImg');
  const logoWrap = document.getElementById('logoWrap');
  logoImg.onerror = () => {
    logoImg.style.display = 'none';
    logoWrap.innerHTML = 'ج';
  };

  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;
    starsEl.appendChild(s);
  }

  // Filter buttons
  const filtersEl = document.getElementById('filters');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === active ? ' active' : '');
    const count = cat === 'الكل' ? menuData.length : menuData.filter(i => i.cat === cat).length;
    btn.innerHTML = `${cat} <span class="count-badge">${count}</span>`;
    btn.onclick = () => filterMenu(cat);
    filtersEl.appendChild(btn);
  });

  function filterMenu(cat) {
    active = cat;
    document.querySelectorAll('.filter-btn').forEach((b, i) => {
      b.classList.toggle('active', categories[i] === cat);
    });
    const header = document.getElementById('catHeader');
    const title = document.getElementById('catTitle');
    if (cat !== 'الكل') {
      header.style.display = 'block';
      title.textContent = cat;
    } else {
      header.style.display = 'none';
    }
    const list = cat === 'الكل' ? menuData : menuData.filter(i => i.cat === cat);
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = '';
    list.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'menu-card';
      card.innerHTML = `
        <div class="dot-accent"></div>
        <div class="card-info">
          <h3>${item.name}</h3>
          ${cat === 'الكل' ? `<span class="cat-tag">${item.cat}</span>` : ''}
        </div>
        <div class="divider"></div>
        <div class="card-price">${item.price}</div>
      `;
      grid.appendChild(card);
      setTimeout(() => {
        card.classList.add('visible');
        card.style.animationDelay = `${idx * 30}ms`;
      }, 10);
    });
  }

  filterMenu('الكل');
</script>
</body>
</html>
